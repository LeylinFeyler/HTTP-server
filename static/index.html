<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,
                   initial-scale=1.0">

    <title>HTTP Server (C)</title>

    <link rel="icon" href="/img/favicon.svg">

    <link rel="stylesheet" href="/css/style.css">

    <script src="/js/app.js" defer></script>
</head>

<body>

    <main class="container">

        <header class="hero">

            <img src="/img/logo.svg" alt="logo" class="logo">

            <div>

                <h1>HTTP Server (C)</h1>

                <p class="subtitle">
                    minimal HTTP server
                    written in C
                </p>

            </div>
        </header>

        <section class="card">

            <h2>Server Status</h2>

            <div class="status">
                <span class="dot"></span>
                online
            </div>

        </section>

        <section class="card">

            <h2>Route Testing</h2>

            <div class="button-grid">

                <button onclick="callEndpoint('/hello')">
                    /hello
                </button>

                <button onclick="callEndpoint('/health')">
                    /health
                </button>

                <button onclick="callEndpoint('/json')">
                    /json
                </button>

            </div>

        </section>

        <section class="card">

            <h2>Query String Demo</h2>

            <div class="input-row">

                <input id="nameInput" type="text" placeholder="enter name">

                <button onclick="greet()">
                    greet
                </button>

            </div>

        </section>

        <section class="card">

            <h2>POST Demo</h2>

            <div class="post-demo">

                <textarea id="postInput" placeholder="type something..."></textarea>

                <button onclick="sendPost()">
                    send POST
                </button>

            </div>

        </section>

        <section class="card">

            <h2>Response</h2>

            <pre id="responseBox">
waiting for request...
            </pre>

        </section>

    </main>

</body>

</html>
